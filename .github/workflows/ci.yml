name: CI

on:
  push:
    branches: [ main, master ]
    paths-ignore:
      - '**.md'
      - '.gitignore'
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read

jobs:
  test:
    name: Run Python Tests
    runs-on: ubuntu-latest

    steps:
      # 1. Récupération du code (version épinglée par commit SHA pour la sécurité)
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # 2. Configuration de Python avec mise en cache automatique des dépendances pip
      - name: Set up Python 3.12
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5.4.0
        with:
          python-version: '3.12'
          cache: 'pip'

      # 3. Installation des dépendances
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. Lint rapide — attrape les erreurs de syntaxe/imports avant même de lancer les tests
      - name: Lint with flake8 (critical errors only)
        run: |
          pip install flake8
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      # 5. Exécution des tests, avec toutes les variables d'env nécessaires
      # même en mode "factice" pour que les imports ne cassent jamais en CI
      - name: Run tests with pytest
        env:
          GREENLIGHT_API_KEY: test-ci-key
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
          POSTGRES_PORT: "5433"
          RABBITMQ_USER: test
          RABBITMQ_PASSWORD: test
          RABBITMQ_HOST: localhost
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_DEFAULT_REGION: us-east-1
          AWS_ENDPOINT_URL: http://localhost:4566
        run: pytest tests/ -v