name: CI
# on: [push, pull_request]
on:
  push:
    branches: [ main, master ]
    paths-ignore:
      - '**.md'
      - '.gitignore'
  pull_request:
    branches: [ main, master ]
    # Avoid that GitHub temprarry token writes in Default branch, which is not allowed
permissions:
  contents: read

jobs:
  test:
    name: Run Python Tests
    runs-on: ubuntu-latest

    steps:
    # - uses: actions/checkout@v4
          # 1. Récupération du code (version épinglée par commit SHA pour la sécurité)
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

          # 2. Configuration de Python avec mise en cache automatique des dépendances pip
      - name: Set up Python 3.12
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5.4.0
        with:
          python-version: '3.12'
          cache: 'pip' # Active la mise en cache automatique via requirements.txt

          # 3. Installation des dépendances
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

          # 4. Exécution des tests
      - name: Run tests with pytest
        run: pytest tests/