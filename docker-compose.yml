services:
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    ports:
      - "5672:5672" 
      - "15672:15672" 
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-admin}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - rabbitmq_logs:/var/log/rabbitmq
    networks:
      - app-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 3

  localstack:
    image: localstack/localstack:3.8
    ports:
      - "4566:4566"
    environment:
      - SERVICES=iam,s3
      - AWS_DEFAULT_REGION=${AWS_REGION:-us-east-1}
    volumes:
      - localstack_data:/var/lib/localstack
      - "/var/run/docker.sock:/var/run/docker.sock"
    networks:
      - app-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -f http://localhost:4566/_localstack/health || exit 1"
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  postgres:
    image: postgres:16-alpine # Utilisation d'Alpine pour réduire la taille et les vulnérabilités
    ports:
      - "5433:5432"
    environment:
      # Remplacement des valeurs codées en dur par des variables sécurisées avec valeurs par défaut
      POSTGRES_USER: ${POSTGRES_USER:-greenlight}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-greenlight}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - app-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G # Limite stricte pour éviter les fuites de mémoire sur l'hôte
    healthcheck:
      # Utilisation dynamique de la variable d'utilisateur pour le test de santé
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-greenlight} -d $${POSTGRES_DB:-greenlight}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  rabbitmq_data:
  rabbitmq_logs:
  localstack_data:
  pgdata: # Volume nommé persistant pour PostgreSQL

networks:
  app-network:
    driver: bridge
